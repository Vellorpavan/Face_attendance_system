<!DOCTYPE html>
<html lang="en">

<head>
    <script src="security_protections.js"></script>

    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
    <title>Face Capture — SVPP ATTENDANCE (FACE RECOGNITION)</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet" />
    <!-- Supabase JS CDN -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
    <!-- Face API JS -->
    <script src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.min.js"></script>
    <script src="config.js"></script>
    <script src="supabase_config.js"></script>
    <script src="notification_service.js"></script>
    <script src="feedback.js"></script>
    <script src="notification.js"></script>
    <style>
        *,
        *::before,
        *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --blue: #1a4fdb;
            --blue-light: #4d7dff;
            --glass-dark: rgba(10, 16, 38, 0.55);
            --glass-border: rgba(255, 255, 255, 0.14);
            --text-primary: #ffffff;
            --text-secondary: rgba(255, 255, 255, 0.65);
            --text-muted: rgba(255, 255, 255, 0.38);
            --success: #12b76a;
            --danger: #e53e5a;
        }

        html,
        body {
            height: 100%;
            width: 100%;
            font-family: 'Inter', sans-serif;
            background: #080f24;
            overflow: hidden;
        }

        /* ── Full-screen camera bg ── */
        .camera-bg {
            position: fixed;
            inset: 0;
            z-index: 0;
            background: #080f24;
        }

        #videoEl,
        #canvasEl {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        #canvasEl {
            display: none;
        }

        /* Dark vignette overlay */
        .vignette {
            position: fixed;
            inset: 0;
            z-index: 1;
            background:
                radial-gradient(ellipse 60% 55% at 50% 45%, transparent 55%, rgba(8, 15, 36, 0.82) 100%);
            pointer-events: none;
        }

        /* ── Full screen layout ── */
        .screen {
            position: fixed;
            inset: 0;
            z-index: 2;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* ── Top header ── */
        .header {
            width: 100%;
            max-width: 420px;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 52px 24px 0;
            animation: fadeDown 0.5s ease both;
        }

        .header-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: rgba(26, 79, 219, 0.25);
            border: 1px solid rgba(77, 125, 255, 0.35);
            border-radius: 999px;
            padding: 5px 14px;
            font-size: 11.5px;
            font-weight: 600;
            color: #99bbff;
            margin-bottom: 10px;
            backdrop-filter: blur(8px);
        }

        .badge-pulse {
            width: 7px;
            height: 7px;
            border-radius: 50%;
            background: #4d7dff;
            box-shadow: 0 0 0 0 rgba(77, 125, 255, 0.6);
            animation: pulse 1.6s ease infinite;
        }

        @keyframes pulse {
            0% {
                box-shadow: 0 0 0 0 rgba(77, 125, 255, 0.6);
            }

            70% {
                box-shadow: 0 0 0 8px rgba(77, 125, 255, 0);
            }

            100% {
                box-shadow: 0 0 0 0 rgba(77, 125, 255, 0);
            }
        }

        .header h1 {
            font-size: 22px;
            font-weight: 800;
            color: var(--text-primary);
            letter-spacing: -0.3px;
            text-align: center;
            margin-bottom: 6px;
            text-shadow: 0 2px 12px rgba(0, 0, 0, 0.4);
        }

        .header p {
            font-size: 13px;
            color: var(--text-secondary);
            text-align: center;
            line-height: 1.55;
            max-width: 260px;
        }

        /* ── Face oval guide ── */
        .oval-wrap {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            position: relative;
        }

        .oval-guide {
            position: relative;
            width: 230px;
            height: 290px;
        }

        /* Animated SVG oval */
        .oval-svg {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
        }

        .oval-ring {
            fill: none;
            stroke: rgba(77, 125, 255, 0.75);
            stroke-width: 2.5;
            stroke-dasharray: 12 6;
            stroke-linecap: round;
            animation: spinRing 8s linear infinite;
            transform-origin: center;
        }

        .oval-ring-solid {
            fill: none;
            stroke: rgba(255, 255, 255, 0.12);
            stroke-width: 1.2;
        }

        @keyframes spinRing {
            to {
                stroke-dashoffset: -100;
            }
        }

        /* Corner bracket decorations */
        .corners {
            position: absolute;
            inset: -4px;
        }

        .corner {
            position: absolute;
            width: 22px;
            height: 22px;
            border-color: #4d7dff;
            border-style: solid;
        }

        .corner.tl {
            top: 0;
            left: 0;
            border-width: 3px 0 0 3px;
            border-radius: 4px 0 0 0;
        }

        .corner.tr {
            top: 0;
            right: 0;
            border-width: 3px 3px 0 0;
            border-radius: 0 4px 0 0;
        }

        .corner.bl {
            bottom: 0;
            left: 0;
            border-width: 0 0 3px 3px;
            border-radius: 0 0 0 4px;
        }

        .corner.br {
            bottom: 0;
            right: 0;
            border-width: 0 3px 3px 0;
            border-radius: 0 0 4px 0;
        }

        /* Center crosshair dot */
        .center-dot {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: rgba(77, 125, 255, 0.6);
            box-shadow: 0 0 12px rgba(77, 125, 255, 0.5);
        }

        /* Scan line */
        .scan-line {
            position: absolute;
            left: 10%;
            right: 10%;
            height: 2px;
            background: linear-gradient(90deg, transparent, rgba(77, 125, 255, 0.85), transparent);
            animation: scanDown 2.4s ease-in-out infinite;
            border-radius: 1px;
            top: 10%;
        }

        @keyframes scanDown {
            0% {
                top: 10%;
                opacity: 0;
            }

            10% {
                opacity: 1;
            }

            90% {
                opacity: 1;
            }

            100% {
                top: 90%;
                opacity: 0;
            }
        }

        /* ── Instructions strip ── */
        .tips {
            width: 100%;
            max-width: 380px;
            padding: 0 20px;
            display: flex;
            gap: 8px;
            justify-content: center;
            margin-bottom: 28px;
            animation: fadeUp 0.5s ease 0.1s both;
        }

        .tip {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 5px;
            background: var(--glass-dark);
            border: 1px solid var(--glass-border);
            border-radius: 14px;
            padding: 10px 6px;
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
        }

        .tip svg {
            width: 16px;
            height: 16px;
            stroke: #99bbff;
            fill: none;
            stroke-width: 1.8;
        }

        .tip span {
            font-size: 10px;
            font-weight: 500;
            color: var(--text-secondary);
            text-align: center;
            line-height: 1.3;
        }

        /* ── Bottom controls ── */
        .controls {
            width: 100%;
            max-width: 420px;
            padding: 0 32px 52px;
            animation: fadeUp 0.5s ease 0.2s both;
        }

        /* Row: switch / capture / flash */
        .ctrl-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        /* Side icon buttons */
        .ctrl-icon-btn {
            width: 52px;
            height: 52px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--glass-dark);
            border: 1px solid var(--glass-border);
            backdrop-filter: blur(14px);
            -webkit-backdrop-filter: blur(14px);
            cursor: pointer;
            transition: transform 0.18s, background 0.18s;
        }

        .ctrl-icon-btn svg {
            width: 22px;
            height: 22px;
            stroke: #fff;
            fill: none;
            stroke-width: 1.8;
        }

        .ctrl-icon-btn:hover {
            transform: scale(1.08);
            background: rgba(26, 79, 219, 0.35);
        }

        .ctrl-icon-btn:active {
            transform: scale(0.95);
        }

        /* Main capture button */
        .capture-btn {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            border: 3px solid rgba(255, 255, 255, 0.22);
            background: linear-gradient(135deg, #1a4fdb, #4d7dff);
            box-shadow: 0 0 0 6px rgba(77, 125, 255, 0.18), 0 12px 36px rgba(26, 79, 219, 0.55);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: transform 0.18s, box-shadow 0.18s;
        }

        .capture-btn svg {
            width: 32px;
            height: 32px;
            stroke: #fff;
            fill: none;
            stroke-width: 1.6;
        }

        .capture-btn:hover {
            transform: scale(1.06);
            box-shadow: 0 0 0 10px rgba(77, 125, 255, 0.22), 0 16px 44px rgba(26, 79, 219, 0.65);
        }

        .capture-btn:active {
            transform: scale(0.94);
        }

        /* ── Captured state overlay ── */
        #capturedOverlay {
            display: none;
            position: fixed;
            inset: 0;
            z-index: 10;
            flex-direction: column;
            align-items: center;
            justify-content: flex-end;
            background: rgba(8, 15, 36, 0.72);
            backdrop-filter: blur(4px);
            animation: fadeIn 0.3s ease both;
        }

        #capturedOverlay.show {
            display: flex;
        }

        .captured-card {
            width: 100%;
            max-width: 420px;
            background: rgba(14, 22, 50, 0.88);
            border: 1px solid rgba(255, 255, 255, 0.12);
            border-radius: 28px 28px 0 0;
            padding: 28px 28px 52px;
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
        }

        .captured-card-top {
            display: flex;
            align-items: center;
            gap: 14px;
            margin-bottom: 22px;
        }

        #thumbImg {
            width: 68px;
            height: 68px;
            border-radius: 16px;
            object-fit: cover;
            border: 2px solid rgba(77, 125, 255, 0.5);
        }

        .captured-info h3 {
            font-size: 16px;
            font-weight: 700;
            color: #fff;
            margin-bottom: 4px;
        }

        .captured-info p {
            font-size: 12.5px;
            color: rgba(255, 255, 255, 0.55);
        }

        .check-badge {
            margin-left: auto;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: rgba(18, 183, 106, 0.18);
            border: 1.5px solid rgba(18, 183, 106, 0.4);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .check-badge svg {
            width: 18px;
            height: 18px;
            stroke: #12b76a;
            fill: none;
            stroke-width: 2.5;
        }

        .action-row {
            display: flex;
            gap: 12px;
        }

        .btn-retake {
            flex: 1;
            padding: 14px 0;
            border-radius: 14px;
            border: 1.5px solid rgba(255, 255, 255, 0.18);
            background: transparent;
            font-family: 'Inter', sans-serif;
            font-size: 14px;
            font-weight: 600;
            color: rgba(255, 255, 255, 0.8);
            cursor: pointer;
            transition: background 0.18s, transform 0.15s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 7px;
        }

        .btn-retake svg {
            width: 16px;
            height: 16px;
            stroke: currentColor;
            fill: none;
            stroke-width: 2;
        }

        .btn-retake:hover {
            background: rgba(255, 255, 255, 0.08);
        }

        .btn-confirm {
            flex: 1.6;
            padding: 14px 0;
            border-radius: 14px;
            border: none;
            background: linear-gradient(135deg, #12b76a, #17d47c);
            font-family: 'Inter', sans-serif;
            font-size: 14px;
            font-weight: 700;
            color: #fff;
            cursor: pointer;
            box-shadow: 0 8px 24px rgba(18, 183, 106, 0.4);
            transition: transform 0.18s, box-shadow 0.18s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 7px;
        }

        .btn-confirm svg {
            width: 16px;
            height: 16px;
            stroke: #fff;
            fill: none;
            stroke-width: 2.5;
        }

        .btn-confirm:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 32px rgba(18, 183, 106, 0.5);
        }

        .btn-confirm:active {
            transform: translateY(0);
        }

        /* ── Status toast ── */
        .toast {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(18, 183, 106, 0.15);
            border: 1px solid rgba(18, 183, 106, 0.4);
            border-radius: 999px;
            padding: 8px 18px;
            font-size: 12.5px;
            font-weight: 600;
            color: #12b76a;
            backdrop-filter: blur(12px);
            z-index: 20;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s;
            white-space: nowrap;
        }

        .toast.show {
            opacity: 1;
        }

        /* Animations */
        @keyframes fadeDown {
            from {
                opacity: 0;
                transform: translateY(-16px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(16px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }

            to {
                opacity: 1;
            }
        }
    </style>
</head>

<body>

    <!-- Camera Start Overlay -->
    <div id="startCameraOverlay"
        style="position:fixed;inset:0;z-index:50;display:flex;flex-direction:column;align-items:center;justify-content:center;background:rgba(8,15,36,0.9);backdrop-filter:blur(10px);">
        <svg viewBox="0 0 24 24"
            style="width:64px;height:64px;stroke:#4d7dff;fill:none;stroke-width:1.5;margin-bottom:20px;">
            <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"></path>
            <circle cx="12" cy="13" r="4"></circle>
        </svg>
        <h2 style="color:#fff;font-size:20px;font-weight:700;margin-bottom:8px;">Camera Access</h2>
        <p style="color:rgba(255,255,255,0.6);font-size:14px;text-align:center;max-width:280px;margin-bottom:30px;">We
            need camera permission to capture your face for attendance.</p>
        <button onclick="requestCameraAccess()"
            style="background:linear-gradient(135deg, #1a4fdb, #4d7dff);border:none;border-radius:14px;padding:15px 32px;color:#fff;font-size:16px;font-weight:600;cursor:pointer;box-shadow:0 8px 24px rgba(26, 79, 219, 0.4);">
            Allow & Start Camera
        </button>
    </div>


    <!-- Camera background -->
    <div class="camera-bg">
        <video id="videoEl" autoplay playsinline muted></video>
        <canvas id="canvasEl"></canvas>
    </div>

    <!-- Vignette -->
    <div class="vignette"></div>

    <!-- Main screen layout -->
    <div class="screen">

        <!-- Header -->
        <div class="header">
            <div class="header-badge">
                <span class="badge-pulse"></span>
                Live Camera
            </div>
            <h1>Capture Your Face</h1>
            <p>Ensure your face is clearly visible for attendance verification</p>
        </div>

        <!-- Oval guide -->
        <div class="oval-wrap">
            <div class="oval-guide">
                <svg class="oval-svg" viewBox="0 0 230 290" xmlns="http://www.w3.org/2000/svg">
                    <ellipse class="oval-ring-solid" cx="115" cy="145" rx="110" ry="140" />
                    <ellipse class="oval-ring" cx="115" cy="145" rx="110" ry="140" />
                </svg>
                <!-- Corners -->
                <div class="corners">
                    <div class="corner tl"></div>
                    <div class="corner tr"></div>
                    <div class="corner bl"></div>
                    <div class="corner br"></div>
                </div>
                <!-- Scan line -->
                <div class="scan-line"></div>
                <!-- Center dot -->
                <div class="center-dot"></div>
            </div>
        </div>

        <!-- Tips -->
        <div class="tips">
            <div class="tip">
                <svg viewBox="0 0 24 24">
                    <circle cx="12" cy="12" r="1" />
                    <circle cx="12" cy="12" r="5" />
                    <path d="M12 1v2M12 21v2M1 12h2M21 12h2" />
                </svg>
                <span>Face centered</span>
            </div>
            <div class="tip">
                <svg viewBox="0 0 24 24">
                    <path d="M12 2a5 5 0 0 1 5 5 7 7 0 0 1-14 0 5 5 0 0 1 5-5z" />
                    <path d="M22 20s-2-4-10-4-10 4-10 4" />
                </svg>
                <span>Remove glasses</span>
            </div>
            <div class="tip">
                <svg viewBox="0 0 24 24">
                    <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" />
                    <circle cx="12" cy="12" r="3" />
                </svg>
                <span>Good lighting</span>
            </div>
        </div>

        <!-- Controls -->
        <div class="controls">
            <div class="ctrl-row">

                <!-- Flash toggle -->
                <button class="ctrl-icon-btn" id="flashBtn" title="Flash" onclick="toggleFlash()">
                    <svg viewBox="0 0 24 24">
                        <path d="M13 2L4.5 13H11L10 22L20.5 11H14L13 2Z" />
                    </svg>
                </button>

                <!-- Capture -->
                <button class="capture-btn" id="captureBtn" onclick="capturePhoto()" title="Capture">
                    <svg viewBox="0 0 24 24">
                        <circle cx="12" cy="12" r="4" />
                        <path
                            d="M20 7h-2.5L16 5H8L6.5 7H4a2 2 0 0 0-2 2v10a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2z" />
                    </svg>
                </button>

                <!-- Switch camera -->
                <button class="ctrl-icon-btn" id="switchBtn" title="Switch Camera" onclick="switchCamera()">
                    <svg viewBox="0 0 24 24">
                        <path
                            d="M20 7h-4l-2-3H10L8 7H4a1 1 0 0 0-1 1v11a1 1 0 0 0 1 1h16a1 1 0 0 0 1-1V8a1 1 0 0 0-1-1z" />
                        <path d="M8 13l2 2 2-2M14 11l-2-2-2 2" stroke-linecap="round" stroke-linejoin="round" />
                    </svg>
                </button>

            </div>
        </div>
    </div>

    <!-- Captured confirmation overlay -->
    <div id="capturedOverlay">
        <div class="captured-card">
            <div class="captured-card-top">
                <img id="thumbImg" src="" alt="Captured face" />
                <div class="captured-info">
                    <h3>Photo Captured</h3>
                    <p>Does it look clean and clear?</p>
                </div>
                <div class="check-badge">
                    <svg viewBox="0 0 24 24">
                        <path d="M5 13l4 4L19 7" />
                    </svg>
                </div>
            </div>
            <div class="action-row">
                <button class="btn-retake" onclick="retakePhoto()">
                    <svg viewBox="0 0 24 24">
                        <path d="M1 4v6h6M23 20v-6h-6" />
                        <path d="M20.49 9A9 9 0 0 0 5.64 5.64L1 10M23 14l-4.64 4.36A9 9 0 0 1 3.51 15" />
                    </svg>
                    Retake
                </button>
                <button class="btn-confirm" onclick="confirmPhoto()">
                    <svg viewBox="0 0 24 24">
                        <path d="M5 13l4 4L19 7" />
                    </svg>
                    Confirm &amp; Save
                </button>
            </div>
        </div>
    </div>

    <!-- Toast -->
    <div class="toast" id="toast">✓ Face saved successfully!</div>

    <script>
        let stream = null;
        let facingMode = 'user';
        let capturedBlob = null;
        let currentUser = null;

        let faceModelsLoaded = false;
        let isTracking = false;
        let consecutiveFrames = 0;
        let trackingInterval = null;

        // ── Auth guard ──
        window.addEventListener('load', async () => {
            const { session, role } = await protectRoute(['student', 'admin']);
            if (!session) return;
            currentUser = session.user;

            // Check if student already exists or has a pending request
            const [{ data: student }, { data: req }] = await Promise.all([
                sb.from('students').select('id').eq('uid', currentUser.id).maybeSingle(),
                sb.from('student_requests').select('status, face_image_url').eq('uid', currentUser.id).maybeSingle()
            ]);

            if (student) {
                window.location.href = 'dashboard.html';
                return;
            }

            if (req) {
                if (req.status === 'pending') {
                    window.location.href = 'pending_approval.html';
                    return;
                } else if (req.status === 'rejected') {
                    window.location.href = 'rejected_approval.html';
                    return;
                }
                // If 'incomplete', they are allowed to stay here to capture face
            } else {
                // No request at all? They should have gone through profile_setup.html first
                window.location.href = 'profile_setup.html';
                return;
            }

            try {
                // Initialize Face API models
                await faceapi.nets.tinyFaceDetector.loadFromUri('/models');
                await faceapi.nets.faceLandmark68Net.loadFromUri('/models');
                await faceapi.nets.faceRecognitionNet.loadFromUri('/models');
                faceModelsLoaded = true;
            } catch (err) {
                console.warn("Face models could not be loaded", err);
                showToast("Failed to load AI models. Refresh page.", true);
            }

            // Show start camera overlay
            document.getElementById('startCameraOverlay').style.display = 'flex';
        });

        async function requestCameraAccess() {
            const btn = document.querySelector('#startCameraOverlay button');
            const originalText = btn.innerHTML;
            btn.innerHTML = 'Starting...';
            btn.disabled = true;

            try {
                await startCamera();
                document.getElementById('startCameraOverlay').style.display = 'none';

                // Start continuous face tracking if models loaded
                if (faceModelsLoaded) {
                    startFaceTracking();
                }
            } catch (e) {
                console.error("Camera access denied:", e);
                showError('Camera access denied. Please allow camera permissions in your browser settings.');
                btn.innerHTML = originalText;
                btn.disabled = false;
            }
        }

        // ── Continuous Face Tracking ──
        async function startFaceTracking() {
            if (isTracking) return;
            isTracking = true;

            const video = document.getElementById('videoEl');
            const scanLine = document.querySelector('.scan-line');
            const ring = document.querySelector('.oval-ring');

            async function track() {
                if (!isTracking || video.paused || video.ended) {
                    trackingInterval = requestAnimationFrame(track);
                    return;
                }

                // Use TinyFaceDetector for fast performance tracking
                const opts = new faceapi.TinyFaceDetectorOptions({ inputSize: 224, scoreThreshold: 0.5 });
                const detection = await faceapi.detectSingleFace(video, opts);

                if (detection && detection.score > 0.6) {
                    consecutiveFrames++;
                    // Turn ring green when highly confident
                    if (consecutiveFrames > 5) {
                        ring.style.stroke = 'rgba(18, 183, 106, 0.8)';
                        scanLine.style.background = 'linear-gradient(90deg, transparent, rgba(18, 183, 106, 0.85), transparent)';
                    }
                } else {
                    consecutiveFrames = 0;
                    ring.style.stroke = 'rgba(77, 125, 255, 0.75)';
                    scanLine.style.background = 'linear-gradient(90deg, transparent, rgba(77, 125, 255, 0.85), transparent)';
                }

                trackingInterval = requestAnimationFrame(track);
            }

            video.addEventListener('play', () => {
                track();
            });
            if (!video.paused) track();
        }

        function stopFaceTracking() {
            isTracking = false;
            if (trackingInterval) cancelAnimationFrame(trackingInterval);
        }

        // ── Face Validation & AI Score (On High-Res Image) ──
        async function validateFace(imageElement) {
            let score = 100;
            const detections = await faceapi.detectAllFaces(
                imageElement,
                new faceapi.TinyFaceDetectorOptions({ inputSize: 416, scoreThreshold: 0.4 })
            ).withFaceLandmarks().withFaceDescriptors();

            // RULE 1: No face
            if (detections.length === 0) {
                return { valid: false, message: "No clear face detected in photo. Please ensure good lighting." };
            }

            // RULE 2: Multiple faces
            if (detections.length > 1) {
                score = 0;
            }

            const detection = detections[0];
            const box = detection.detection.box;

            // Face size check (too small/unclear)
            if (box.width < 90 || box.height < 90) {
                score -= 30;
                if (box.width < 60) return { valid: false, message: "Face is too far away. Move closer." };
            }

            // RULE 4: Brightness check
            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d');
            canvas.width = imageElement.naturalWidth || 600;
            canvas.height = imageElement.naturalHeight || 800;
            ctx.drawImage(imageElement, 0, 0, canvas.width, canvas.height);

            const pixels = ctx.getImageData(0, 0, 100, 100).data;
            let brightness = 0;
            for (let i = 0; i < pixels.length; i += 4) {
                brightness += pixels[i];
            }
            brightness = brightness / (pixels.length / 4);

            if (brightness < 40) {
                score -= 30;
                // Still keep a hard stop if it's completely black/unreadable
                if (brightness < 12) return { valid: false, message: "Image is too dark to read." };
            }

            const descriptor = Array.from(detection.descriptor);

            return { valid: true, score: score, descriptor: descriptor };
        }

        // ── Camera ──
        async function startCamera() {
            if (stream) stream.getTracks().forEach(t => t.stop());
            stream = await navigator.mediaDevices.getUserMedia({
                video: { facingMode, width: { ideal: 1280 }, height: { ideal: 720 } },
                audio: false
            });
            document.getElementById('videoEl').srcObject = stream;
        }

        // ── Capture (compress to max 600px wide, JPEG 0.82) ──
        function capturePhoto() {
            if (consecutiveFrames < 3 && faceModelsLoaded) {
                showToast("Please keep still until face is detected.", true);
                return; // DO NOT block completely for safety, but discourage random shooting
            }

            const video = document.getElementById('videoEl');
            const canvas = document.getElementById('canvasEl');
            const maxW = 600;
            const scale = Math.min(1, maxW / (video.videoWidth || 600));
            const w = Math.round((video.videoWidth || 600) * scale);
            const h = Math.round((video.videoHeight || 800) * scale);

            canvas.width = w; canvas.height = h;
            const ctx = canvas.getContext('2d');

            if (facingMode === 'user') { ctx.translate(w, 0); ctx.scale(-1, 1); }
            ctx.drawImage(video, 0, 0, w, h);

            // Store as blob for upload
            canvas.toBlob(blob => {
                capturedBlob = blob;
                const url = URL.createObjectURL(blob);
                document.getElementById('thumbImg').src = url;
                document.getElementById('capturedOverlay').classList.add('show');
                stopFaceTracking(); // Pause tracking while reviewing
                // Stop camera to save battery
                if (stream) stream.getTracks().forEach(t => t.stop());
            }, 'image/jpeg', 0.82);

            const btn = document.getElementById('captureBtn');
            btn.style.transform = 'scale(0.9)';
            setTimeout(() => { btn.style.transform = ''; }, 180);
        }

        // ── Retake ──
        async function retakePhoto() {
            document.getElementById('capturedOverlay').classList.remove('show');
            capturedBlob = null;
            // Restart camera and tracking
            await startCamera();
            startFaceTracking();
        }

        // ── Save confirmed photo ──
        async function confirmPhoto() {
            if (!capturedBlob || !currentUser) return;
            const btn = document.querySelector('.btn-confirm');
            const originalHTML = btn.innerHTML;

            btn.innerHTML = '<div style="width:16px;height:16px;border:2px solid #fff;border-top-color:transparent;border-radius:50%;animation:spinRing 0.8s linear infinite;"></div> Saving...';
            btn.disabled = true;
            document.querySelector('.btn-retake').disabled = true;

            try {
                // Validation before upload
                const imgElement = document.getElementById('thumbImg');
                const result = await validateFace(imgElement);
                if (!result.valid) {
                    showToast(result.message, true);
                    throw new Error("Validation Failed: " + result.message);
                }

                // Upload to storage
                const fileName = `${currentUser.id}/${Date.now()}.jpg`;
                const { error: upErr } = await sb.storage
                    .from('student-faces')
                    .upload(fileName, capturedBlob, { contentType: 'image/jpeg' });

                if (upErr) throw upErr;

                // get public url
                const { data: { publicUrl } } = sb.storage.from('student-faces').getPublicUrl(fileName);

                // Determine Registration State
                const finalStatus = result.score < 50 ? 'rejected' : 'pending';

                // Update database: student_requests status -> pending with image url and AI metadata
                const { error: dbErr } = await sb
                    .from('student_requests')
                    .update({
                        face_image_url: publicUrl,
                        status: finalStatus
                    })
                    .eq('uid', currentUser.id);

                if (dbErr) throw dbErr;

                // ── Trigger Notification to Verifiers ──
                if (finalStatus === 'pending') {
                    // Registration request saved in student_requests, notifications disabled as per task
                }


                if (finalStatus === 'rejected') {
                    showToast(`AI Auto-Rejected ❌ (Score: ${result.score}/100)`, true);
                    btn.innerHTML = originalHTML;
                    btn.disabled = false;
                    document.querySelector('.btn-retake').disabled = false;
                    return;
                }

                showToast("Face saved successfully!");
                setTimeout(() => {
                    // Redirect to dashboard
                    window.location.href = 'dashboard.html';
                }, 1200);

            } catch (e) {
                console.error(e);
                // Do not use confusing alert for validation errors, toast is enough
                if (!e.message.includes("Validation Failed")) {
                    showError('System Error: ' + e.message);
                }
                btn.innerHTML = originalHTML;
                btn.disabled = false;
                document.querySelector('.btn-retake').disabled = false;
            }
        }

        // ── Switch camera ──
        async function switchCamera() {
            facingMode = facingMode === 'user' ? 'environment' : 'user';
            const btn = document.getElementById('switchBtn');
            btn.style.transform = 'rotate(180deg)';
            btn.style.transition = 'transform 0.4s ease';
            await startCamera();
            setTimeout(() => { btn.style.transform = 'rotate(0deg)'; }, 450);
        }

        // ── Flash toggle ──
        let flashOn = false;
        function toggleFlash() {
            flashOn = !flashOn;
            const btn = document.getElementById('flashBtn');
            btn.style.background = flashOn ? 'rgba(255,220,80,0.25)' : 'rgba(10,16,38,0.55)';
            btn.querySelector('svg').style.stroke = flashOn ? '#ffd050' : '#fff';
            if (stream) {
                const track = stream.getVideoTracks()[0];
                if (track?.getCapabilities?.().torch) {
                    track.applyConstraints({ advanced: [{ torch: flashOn }] });
                }
            }
        }

        // ── Toast ──
        function showToast(msg, isErr = false) {
            const t = document.getElementById('toast');
            t.textContent = msg;
            t.style.color = isErr ? '#e53e5a' : '#12b76a';
            t.style.background = isErr ? 'rgba(229,62,90,0.15)' : 'rgba(18,183,106,0.15)';
            t.style.borderColor = isErr ? 'rgba(229,62,90,0.4)' : 'rgba(18,183,106,0.4)';
            t.classList.add('show');
            setTimeout(() => t.classList.remove('show'), 2800);
        }

    </script>
