<!DOCTYPE html>
<html lang="en">

<head>
    <script src="security_protections.js"></script>

    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
    <title>Manage Verifiers — Admin</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
        rel="stylesheet" />
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
    <script src="config.js"></script>
    <script src="supabase_config.js"></script>
    <script src="feedback.js"></script>
    <script src="notification.js"></script>
    <script src="actions.js" defer></script>
    <style>
        :root {
            --primary: #1a4fdb;
            --primary-hover: #153bb0;
            --danger: #e53e5a;
            --danger-hover: #c92a43;
            --bg: #f1f5ff;
            --card-bg: #ffffff;
            --text-main: #0d1b3e;
            --text-muted: #4a6080;
            --border: rgba(26, 79, 219, 0.12);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background: var(--bg);
            color: var(--text-main);
            -webkit-font-smoothing: antialiased;
        }

        .top-bar {
            background: var(--card-bg);
            border-bottom: 1px solid var(--border);
            padding: 16px 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: 0 4px 20px rgba(26, 79, 219, 0.04);
        }

        .brand {
            font-size: 1.25rem;
            font-weight: 800;
            letter-spacing: -0.02em;
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
        }

        .brand svg {
            width: 20px;
            stroke: var(--text-main);
            fill: none;
            stroke-width: 2.5;
        }

        .brand span {
            color: var(--primary);
        }

        .container {
            max-width: 900px;
            margin: 32px auto;
            padding: 0 24px;
        }

        .header-content {
            margin-bottom: 32px;
        }

        .header-content h1 {
            font-size: 1.75rem;
            font-weight: 800;
            margin-bottom: 8px;
        }

        .header-content p {
            color: var(--text-muted);
            font-size: 1rem;
        }

        .card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 24px;
            box-shadow: 0 4px 12px rgba(26, 79, 219, 0.04);
            margin-bottom: 24px;
        }

        .form-group {
            margin-bottom: 16px;
        }

        .form-group label {
            display: block;
            font-size: 0.9rem;
            font-weight: 600;
            margin-bottom: 8px;
            color: var(--text-main);
        }

        .form-group input {
            width: 100%;
            padding: 12px;
            border: 1px solid var(--border);
            border-radius: 8px;
            font-size: 0.95rem;
            outline: none;
            transition: all 0.2s;
        }

        .form-group input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(26, 79, 219, 0.1);
        }

        .btn {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            border: none;
            border-radius: 8px;
            padding: 10px 18px;
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            justify-content: center;
        }

        .btn-primary {
            background: var(--primary);
            color: #fff;
        }

        .btn-primary:hover {
            background: var(--primary-hover);
        }

        .btn-danger {
            background: rgba(229, 62, 90, 0.1);
            color: var(--danger);
            border: 1px solid rgba(229, 62, 90, 0.2);
        }

        .btn-danger:hover {
            background: var(--danger);
            color: #fff;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 16px;
        }

        th,
        td {
            padding: 14px 16px;
            text-align: left;
            border-bottom: 1px solid var(--border);
        }

        th {
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.05em;
            background: #f8fafc;
        }

        td {
            font-size: 0.95rem;
            font-weight: 500;
        }

        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: var(--text-muted);
        }

        .toast {
            position: fixed;
            bottom: 20px;
            right: 20px;
            padding: 12px 24px;
            border-radius: 8px;
            background: #333;
            color: #fff;
            font-weight: 500;
            font-size: 14px;
            transform: translateY(100px);
            opacity: 0;
            transition: all 0.3s cubic-bezier(0.22, 1, 0.36, 1);
            z-index: 1000;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
        }

        .toast.show {
            transform: translateY(0);
            opacity: 1;
        }

        .toast.error {
            background: var(--danger);
        }

        .toast.success {
            background: #10b981;
        }

        @media (max-width: 600px) {

            th,
            td {
                padding: 10px;
            }

            .btn {
                padding: 8px 12px;
                font-size: 0.8rem;
            }
        }
    </style>
</head>

<body>

    <script>
        function goBack() {
            window.history.back();
        }
    </script>

    <div class="top-bar">
        <div class="brand" onclick="window.location.href='admin_dashboard.html'">
            <svg viewBox="0 0 24 24">
                <path d="M19 12H5" />
                <path d="M12 19l-7-7 7-7" />
            </svg>
            Admin<span>Panel</span>
        </div>
    </div>

    <div class="container">
        <div class="header-content">
            <h1>Manage Verifiers</h1>
            <p>Add or remove staff accounts that have access to verify and approve students.</p>
        </div>

        <div class="card">
            <h3 style="margin-bottom: 16px; font-size: 1.1rem;">Add New Verifier</h3>
            <form id="addForm" style="display: grid; grid-template-columns: 1fr 1fr auto; gap: 16px; align-items: end;">
                <div class="form-group" style="margin:0;">
                    <label>Full Name</label>
                    <input type="text" id="vName" placeholder="e.g. John Doe" required />
                </div>
                <div class="form-group" style="margin:0;">
                    <label>Email Address</label>
                    <input type="email" id="vEmail" placeholder="e.g. staff@svpcet.org" required />
                </div>
                <button type="submit" class="btn btn-primary" id="addBtn" style="height: 43px; padding: 0 24px;">Add
                    Verifier</button>
            </form>
        </div>

        <div class="card">
            <h3
                style="margin-bottom: 16px; font-size: 1.1rem; display: flex; justify-content: space-between; align-items: center;">
                Active Verifiers
                <span id="vCount"
                    style="font-size: 0.85rem; background: var(--primary); color: white; padding: 2px 8px; border-radius: 12px;">0</span>
            </h3>
            <div style="overflow-x: auto;">
                <table>
                    <thead>
                        <tr>
                            <th>Name</th>
                            <th>Email Address</th>
                            <th>Added On</th>
                            <th style="text-align: right;">Actions</th>
                        </tr>
                    </thead>
                    <tbody id="verifiersTable">
                        <tr>
                            <td colspan="4" class="empty-state">Loading verifiers...</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <div id="toast" class="toast"></div>

    <script>
        const form = document.getElementById('addForm');
        const addBtn = document.getElementById('addBtn');
        const vName = document.getElementById('vName');
        const vEmail = document.getElementById('vEmail');
        const tBody = document.getElementById('verifiersTable');
        const vCount = document.getElementById('vCount');
        const DEFAULT_VERIFIER = 'mohammed.shohel9@gmail.com';

        window.addEventListener('load', async () => {
            const { session, role } = await protectRoute(['admin']);
            if (!session) return;

            loadVerifiers();
        });

        // Page-specific action success handler
        document.addEventListener('actionSuccess', (e) => {
            if (e.detail.table === 'verifiers') loadVerifiers();
        });

        async function loadVerifiers() {
            const { data, error } = await sb
                .from('verifiers')
                .select('*')
                .order('created_at', { ascending: false });

            if (error) {
                showToast('Failed to load verifiers', 'error');
                return;
            }

            let renderedCount = 0;

            let html = `
                <tr>
                    <td>System Administrator <span style="font-size: 0.7rem; background: #dcfce7; color: #059669; padding: 2px 6px; border-radius: 4px; margin-left: 6px;">Default</span></td>
                    <td>${DEFAULT_VERIFIER}</td>
                    <td style="color:var(--text-muted); font-size:0.85rem;">System</td>
                    <td style="text-align: right;">
                        <button class="btn btn-danger" style="opacity: 0.5; cursor: not-allowed;" title="Cannot remove default admin" disabled>System</button>
                    </td>
                </tr>
            `;

            renderedCount++;

            if (data.length > 0) {
                renderedCount += data.length;
                html += data.map(v => `
                    <tr>
                        <td>${escapeHTML(v.name)}</td>
                        <td>${escapeHTML(v.email)}</td>
                        <td style="color:var(--text-muted); font-size:0.85rem;">${new Date(v.created_at).toLocaleDateString()}</td>
                        <td style="text-align: right;">
                            <button class="btn btn-danger delete-btn" 
                                    data-action="delete" 
                                    data-id="${v.id}" 
                                    data-table="verifiers">Remove</button>
                        </td>
                    </tr>
                `).join('');
            }

            vCount.textContent = renderedCount;
            tBody.innerHTML = html;
        }

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            const name = vName.value.trim();
            const email = vEmail.value.trim().toLowerCase();

            if (!name || !email) return;

            if (email === DEFAULT_VERIFIER.toLowerCase()) {
                showToast("This user is already the default verifier.", 'error');
                return;
            }

            addBtn.textContent = 'Adding...';
            addBtn.disabled = true;

            try {
                // Check dupes
                const { data: existing } = await sb.from('verifiers').select('id').eq('email', email).maybeSingle();
                if (existing) throw new Error("A verifier with this email already exists.");

                const { error } = await sb.from('verifiers').insert([{ name, email }]);
                if (error) throw error;

                showToast('Verifier added successfully', 'success');
                vName.value = '';
                vEmail.value = '';
                loadVerifiers();

            } catch (err) {
                showToast(err.message || 'Failed to add verifier', 'error');
            } finally {
                addBtn.textContent = 'Add Verifier';
                addBtn.disabled = false;
            }
        });

        function showToast(msg, type = 'success') {
            const toast = document.getElementById('toast');
            toast.textContent = msg;
            toast.className = `toast show ${type}`;
            setTimeout(() => { toast.className = 'toast'; }, 3000);
        }
    </script>
</body>

</html>
