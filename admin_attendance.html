<!DOCTYPE html>
<html lang="en">

<head>
    <script src="security_protections.js"></script>

    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
    <title>View Attendance — Admin</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
        rel="stylesheet" />
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
    <script src="config.js"></script>
    <script src="supabase_config.js"></script>
    <style>
        :root {
            --blue: #1a4fdb;
            --blue-soft: rgba(26, 79, 219, 0.08);
            --green: #12b76a;
            --amber: #f59e0b;
            --rose: #e53e5a;
            --tp: #0d1b3e;
            --ts: #4a6080;
            --bg: #f1f5ff;
            --card: #ffffff;
            --border: rgba(26, 79, 219, 0.1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: var(--tp);
            padding-bottom: 80px;
        }

        .header {
            padding: 50px 22px 20px;
            background: var(--card);
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 15px;
            position: sticky;
            top: 0;
            z-index: 10;
        }

        .back-btn {
            width: 40px;
            height: 40px;
            border-radius: 12px;
            background: var(--blue-soft);
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--blue);
            text-decoration: none;
        }

        .back-btn svg {
            width: 20px;
            height: 20px;
            stroke: currentColor;
            fill: none;
            stroke-width: 2.5;
        }

        .header-title {
            font-size: 20px;
            font-weight: 800;
        }

        .controls {
            padding: 20px 22px;
        }

        .date-picker {
            width: 100%;
            padding: 14px 16px;
            border-radius: 14px;
            border: 1px solid var(--border);
            font-family: 'Inter', sans-serif;
            font-size: 15px;
            font-weight: 600;
            color: var(--tp);
            background: var(--card);
            outline: none;
            box-shadow: 0 4px 12px rgba(26, 79, 219, 0.03);
            margin-bottom: 20px;
        }

        .stats-summary {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        .stat-box {
            flex: 1;
            background: var(--card);
            padding: 15px;
            border-radius: 16px;
            border: 1px solid var(--border);
            text-align: center;
        }

        .stat-val {
            font-size: 24px;
            font-weight: 800;
        }

        .stat-lbl {
            font-size: 11px;
            font-weight: 600;
            color: var(--ts);
            margin-top: 4px;
        }

        .subject-list {
            padding: 0 22px;
            display: flex;
            flex-direction: column;
            gap: 14px;
        }

        .filter-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
            margin-bottom: 20px;
        }

        .filter-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .filter-group label {
            font-size: 11px;
            font-weight: 700;
            color: var(--ts);
            text-transform: uppercase;
        }

        .filter-select {
            width: 100%;
            padding: 12px;
            border-radius: 12px;
            border: 1px solid var(--border);
            font-family: 'Inter', sans-serif;
            font-size: 14px;
            font-weight: 600;
            color: var(--tp);
            background: var(--card);
            outline: none;
            box-shadow: 0 4px 12px rgba(26, 79, 219, 0.03);
            appearance: none;
        }

        .period-badge {
            font-size: 11px;
            font-weight: 800;
            color: var(--blue);
            background: var(--blue-soft);
            padding: 4px 10px;
            border-radius: 8px;
            display: inline-block;
            margin-bottom: 8px;
            text-transform: uppercase;
        }

        .subject-card {
            background: var(--card);
            padding: 18px;
            border-radius: 18px;
            border: 1px solid var(--border);
            box-shadow: 0 4px 16px rgba(26, 79, 219, 0.04);
        }

        .sub-code {
            font-size: 11px;
            font-weight: 700;
            color: var(--blue);
            background: var(--blue-soft);
            padding: 4px 10px;
            border-radius: 8px;
            display: inline-block;
            margin-bottom: 8px;
        }

        .sub-name {
            font-size: 16px;
            font-weight: 700;
            color: var(--tp);
            margin-bottom: 4px;
        }

        .sub-meta {
            font-size: 12px;
            color: var(--ts);
            font-weight: 500;
            margin-bottom: 12px;
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            align-items: center;
        }

        .sub-meta span.dot {
            width: 4px;
            height: 4px;
            background: #cbd5e1;
            border-radius: 50%;
        }

        .teacher-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: #f8fafc;
            border: 1px solid #e2e8f0;
            padding: 4px 10px;
            border-radius: 8px;
            font-size: 11px;
            font-weight: 600;
            color: #475569;
            margin-bottom: 12px;
        }

        .attendance-pills {
            display: flex;
            gap: 8px;
        }

        .pill {
            flex: 1;
            padding: 12px;
            border-radius: 12px;
            text-align: center;
            font-weight: 700;
            font-size: 15px;
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .pill-lbl {
            font-size: 10px;
            font-weight: 600;
            opacity: 0.8;
            text-transform: uppercase;
        }

        .pill.present {
            background: rgba(18, 183, 106, 0.1);
            color: var(--green);
        }

        .pill.absent {
            background: rgba(229, 62, 90, 0.1);
            color: var(--rose);
        }

        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: var(--ts);
            font-size: 14px;
        }

        /* Modal Styles */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(13, 27, 62, 0.4);
            backdrop-filter: blur(8px);
            z-index: 1000;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s;
            display: flex;
            align-items: flex-end;
            justify-content: center;
        }

        .modal-overlay.active {
            opacity: 1;
            visibility: visible;
        }

        .modal-content {
            background: var(--card);
            width: 100%;
            max-width: 480px;
            border-top-left-radius: 28px;
            border-top-right-radius: 28px;
            padding: 24px;
            transform: translateY(100%);
            transition: transform 0.4s cubic-bezier(0.2, 1, 0.3, 1);
            max-height: 85vh;
            display: flex;
            flex-direction: column;
        }

        .modal-overlay.active .modal-content {
            transform: translateY(0);
        }

        .modal-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 20px;
            padding-bottom: 12px;
            border-bottom: 1px solid var(--border);
        }

        .modal-title {
            font-size: 18px;
            font-weight: 800;
            color: var(--tp);
        }

        .modal-close {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: var(--bg);
            border: none;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }

        .modal-close svg {
            width: 18px;
            height: 18px;
            stroke: var(--ts);
            fill: none;
            stroke-width: 2.5;
        }

        .student-list {
            overflow-y: auto;
            flex: 1;
            padding-right: 4px;
        }

        .student-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px;
            background: #f8fafc;
            border-radius: 12px;
            margin-bottom: 8px;
            border: 1px solid var(--border);
        }

        .student-index {
            width: 24px;
            font-size: 12px;
            font-weight: 700;
            color: var(--ts);
        }

        .student-info {
            flex: 1;
        }

        .student-name {
            font-size: 14px;
            font-weight: 700;
            color: var(--tp);
        }

        .student-roll {
            font-size: 12px;
            font-weight: 500;
            color: var(--ts);
        }

        .student-avatar {
            width: 36px;
            height: 36px;
            border-radius: 10px;
            object-fit: cover;
            border: 1px solid var(--border);
        }

        .avatar-placeholder {
            width: 36px;
            height: 36px;
            border-radius: 10px;
            background: var(--blue-soft);
            color: var(--blue);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 14px;
        }

        .pill {
            cursor: pointer;
            transition: transform 0.1s, background 0.2s;
        }

        .pill:active {
            transform: scale(0.96);
        }
    </style>
</head>

<body>
    <div class="header">
        <a href="javascript:void(0)"
            onclick="if(document.referrer) { history.back(); } else { window.location.href='admin_dashboard.html'; }"
            class="back-btn">
            <svg viewBox="0 0 24 24">
                <path d="M15 18l-6-6 6-6" />
            </svg>
        </a>
        <div class="header-title">View Attendance</div>
    </div>

    <div class="controls">
        <input type="date" id="datePicker" class="date-picker" />

        <div class="filter-grid">
            <div class="filter-group">
                <label>Year</label>
                <select id="yearFilter" class="filter-select">
                    <option value="all">All</option>
                    <option value="1">Year 1</option>
                    <option value="2">Year 2</option>
                    <option value="3">Year 3</option>
                    <option value="4">Year 4</option>
                </select>
            </div>
            <div class="filter-group">
                <label>Sem</label>
                <select id="semFilter" class="filter-select">
                    <option value="all">All</option>
                    <option value="1">Sem 1</option>
                    <option value="2">Sem 2</option>
                </select>
            </div>
            <div class="filter-group">
                <label>Branch</label>
                <select id="branchFilter" class="filter-select">
                    <option value="all">All Branches</option>
                    <option value="AI">AI</option>
                    <option value="AI&ML">AI&ML</option>
                    <option value="DS">DS</option>
                    <option value="CSE">CSE</option>
                </select>
            </div>
            <div class="filter-group">
                <label>Section</label>
                <select id="sectionFilter" class="filter-select">
                    <option value="all">All</option>
                    <option value="A">A</option>
                    <option value="B">B</option>
                    <option value="C">C</option>
                </select>
            </div>
        </div>

        <div class="stats-summary">
            <div class="stat-box">
                <div class="stat-val" id="totalPresent" style="color:var(--green)">0</div>
                <div class="stat-lbl">Total Present</div>
            </div>
            <div class="stat-box">
                <div class="stat-val" id="totalAbsent" style="color:var(--rose)">0</div>
                <div class="stat-lbl">Total Absent</div>
            </div>
        </div>
    </div>

    <div class="subject-list" id="subjectList">
        <div class="empty-state">Loading attendance data...</div>
    </div>

    <!-- Modal for student list -->
    <div class="modal-overlay" id="modalOverlay" onclick="if(event.target === this) closeModal()">
        <div class="modal-content">
            <div class="modal-header">
                <div class="modal-title" id="modalTitle">Students List</div>
                <button class="modal-close" onclick="closeModal()">
                    <svg viewBox="0 0 24 24">
                        <path d="M18 6L6 18M6 6l12 12" />
                    </svg>
                </button>
            </div>
            <div class="student-list" id="modalStudentList">
                <!-- Students will be listed here -->
            </div>
        </div>
    </div>

    <script>
        let allSubjects = [];
        let allTeachers = [];
        let currentUser;

        window.addEventListener('load', async () => {
            try {
                const { session, role } = await protectRoute(['admin']);
                if (!session) return;
                currentUser = session.user;

                const today = new Date().toISOString().split('T')[0];
                const datePicker = document.getElementById('datePicker');
                datePicker.value = today;

                // Fetch references
                const [subjRes, teachRes] = await Promise.all([
                    sb.from('subjects').select('*'),
                    sb.from('authorized_teachers').select('*')
                ]);

                allSubjects = subjRes.data || [];
                allTeachers = teachRes.data || [];

                // Add listeners
                const filters = ['datePicker', 'yearFilter', 'semFilter', 'sectionFilter', 'branchFilter'];
                filters.forEach(id => {
                    const el = document.getElementById(id);
                    if (el) el.addEventListener('change', loadAttendance);
                });

                await loadAttendance();
            } catch (err) {
                console.error("Initialization error:", err);
                document.getElementById('subjectList').innerHTML = 
                    `<div class="empty-state" style="color:var(--rose)">Critical initialization error. Please refresh.</div>`;
            }
        });

        async function loadAttendance() {
            const date = document.getElementById('datePicker').value;
            const yearVal = document.getElementById('yearFilter').value;
            const semVal = document.getElementById('semFilter').value;
            const secVal = document.getElementById('sectionFilter').value;
            const branchVal = document.getElementById('branchFilter').value;

            if (!date) return;

            const list = document.getElementById('subjectList');
            list.innerHTML = '<div class="empty-state">Loading records...</div>';

            // 1. Get day of week
            const dayNames = ['SUN', 'MON', 'TUE', 'WED', 'THU', 'FRI', 'SAT'];
            // Use T12:00:00 to avoid timezone shifts back to previous day
            const d = new Date(date + 'T12:00:00');
            const day = dayNames[d.getDay()];

            if (day === 'SUN') {
                list.innerHTML = '<div class="empty-state" style="font-weight:600">Today is Sunday. No classes are scheduled.</div>';
                document.getElementById('totalPresent').textContent = '0';
                document.getElementById('totalAbsent').textContent = '0';
                return;
            }

            // 2. Build dynamic workload query
            let wlQuery = sb.from('teacher_workload').select('*').eq('day', day);
            if (yearVal !== 'all') wlQuery = wlQuery.eq('year', parseInt(yearVal));
            if (semVal !== 'all') wlQuery = wlQuery.eq('semester', parseInt(semVal));
            if (secVal !== 'all') wlQuery = wlQuery.eq('section', secVal);
            if (branchVal !== 'all') wlQuery = wlQuery.eq('branch', branchVal);

            const { data: workload, error: wlError } = await wlQuery;

            if (wlError) {
                console.error("Workload error:", wlError);
                list.innerHTML = `<div class="empty-state" style="color:red">Error loading workload.</div>`;
                return;
            }

            if (!workload || workload.length === 0) {
                list.innerHTML = '<div class="empty-state">No classes scheduled for this day in the timetable.</div>';
                document.getElementById('totalPresent').textContent = '0';
                document.getElementById('totalAbsent').textContent = '0';
                return;
            }

            // 3. Fetch attendance records joined with students
            let attQuery = sb.from('attendance')
                .select('*, students!inner(name, roll_number, section, year, branch, semester, face_image_url)')
                .eq('date', date);

            if (secVal !== 'all') attQuery = attQuery.eq('students.section', secVal);
            if (yearVal !== 'all') attQuery = attQuery.eq('students.year', yearVal);
            if (semVal !== 'all') attQuery = attQuery.eq('students.semester', semVal);
            if (branchVal !== 'all') attQuery = attQuery.eq('students.branch', branchVal);

            try {
                const { data: attendance, error: attError } = await attQuery;

                if (attError) {
                    console.error("Attendance error:", attError);
                    list.innerHTML = `<div class="empty-state" style="color:var(--rose)">Error loading attendance records.</div>`;
                    return;
                }

                // Step 4 — Debug Query Result
                console.log("Attendance records:", attendance);

                // Fixed Total Counts: Use period_count to handle both independent and consolidated rows
                const totalP = (attendance || []).reduce((sum, a) => {
                    if (a.status?.toLowerCase() === 'present') return sum + (a.period_count || 1);
                    return sum;
                }, 0);
                const totalA = (attendance || []).reduce((sum, a) => {
                    if (a.status?.toLowerCase() === 'absent') return sum + (a.period_count || 1);
                    return sum;
                }, 0);

                document.getElementById('totalPresent').textContent = totalP;
                document.getElementById('totalAbsent').textContent = totalA;

                list.innerHTML = '';

                // Sort workload by branch, year, section, then period (Robust)
                workload.sort((a, b) => {
                    const bA = a.branch || '';
                    const bB = b.branch || '';
                    const branchOrder = bA.localeCompare(bB);
                    if (branchOrder !== 0) return branchOrder;

                    if ((a.year || 0) !== (b.year || 0)) return (a.year || 0) - (b.year || 0);

                    const sA = a.section || '';
                    const sB = b.section || '';
                    const sectionOrder = sA.localeCompare(sB);
                    if (sectionOrder !== 0) return sectionOrder;

                    const pA = a.period || '';
                    const pB = b.period || '';
                    return pA.localeCompare(pB, undefined, { numeric: true });
                });

                let currentGroup = '';

                // ── Continuous Period Fix ──
                // Build a map: subject+class → first attendance record found.
                // When a period has 0 attendance but the same subject appeared
                // in the previous period (same branch/year/sem/section), reuse.
                let previousSlot = null;   // { subjectKey, branch, year, section, semester, period, attRecords }

                workload.forEach(item => {
                    // Check for new group header
                    const groupKey = `${item.branch} · Year ${item.year} · Section ${item.section}`;
                    if (groupKey !== currentGroup) {
                        currentGroup = groupKey;
                        previousSlot = null;
                        const header = document.createElement('div');
                        header.className = 'group-header';
                        header.style = 'grid-column: 1 / -1; padding: 12px 16px; background: rgba(26, 79, 219, 0.04); border-radius: 12px; font-weight: 800; font-size: 14px; color: var(--blue); margin-top: 16px; border-left: 4px solid var(--blue);';
                        header.textContent = groupKey;
                        list.appendChild(header);
                    }
                    // Step 3 — Smart Subject Mapping
                    let sub = allSubjects.find(s => s.id === item.subject_id);
                    if (!sub && item.subject) {
                        sub = allSubjects.find(s => s.name === item.subject || s.code === item.subject);
                    }
                    const displaySub = sub || { name: item.subject || 'Unknown Subject', code: '??' };
                    const subId = sub ? sub.id : item.subject_id;

                    const teacher = allTeachers.find(t => t.id === item.teacher_id) || { name: 'Unassigned' };

                    // A stable key for subject within a class group
                    const subjectKey = subId || item.subject || '';

                    // Filter attendance for this subject slot
                    let subjAtt = (attendance || []).filter(a => {
                        // Match Subject ID
                        const subMatch = (a.subject_id === subId || (!subId && a.subject_id === null));

                        // Match Period (Flexible Match for consolidated or independent records)
                        const cardPeriod = item.period;
                        const recordPeriod = a.period || "";
                        const periodMatch = (recordPeriod === cardPeriod || 
                                         recordPeriod.split('-').includes(cardPeriod));

                        const student = a.students || {};
                        return subMatch &&
                            periodMatch &&
                            student.section === item.section &&
                            student.year === String(item.year) &&
                            student.branch === item.branch;
                    });

                    let usedPeriod = item.period;

                    // ── CONTINUOUS PERIOD FIX ──
                    // If this period has no attendance data, check if the
                    // PREVIOUS period in the same class group has the same
                    // subject.  If yes, reuse its attendance data.
                    if (subjAtt.length === 0 && previousSlot) {
                        const sameClass = (
                            previousSlot.branch === item.branch &&
                            String(previousSlot.year) === String(item.year) &&
                            previousSlot.section === item.section &&
                            previousSlot.subjectKey === subjectKey
                        );
                        if (sameClass && previousSlot.attRecords.length > 0) {
                            subjAtt = previousSlot.attRecords;
                            usedPeriod = previousSlot.period;
                        }
                    }

                    // Also check the NEXT period in the timetable — if it is
                    // the same subject and has attendance while this one is
                    // empty, pull from there too.  This handles P1←P2 where
                    // attendance is only on P2.
                    if (subjAtt.length === 0) {
                        const thisIdx = workload.indexOf(item);
                        for (let ni = thisIdx + 1; ni < workload.length; ni++) {
                            const next = workload[ni];
                            if (`${next.branch}·${next.year}·${next.section}` !== `${item.branch}·${item.year}·${item.section}`) break;
                            const nextSub = allSubjects.find(s => s.id === next.subject_id);
                            const nextKey = (nextSub ? nextSub.id : next.subject_id) || next.subject || '';
                            if (nextKey !== subjectKey) break;
                            // next has same subject — look for its attendance
                            const nextAtt = (attendance || []).filter(a => {
                                const subMatch = (a.subject_id === subId || (!subId && a.subject_id === null));
                                const recordPeriod = a.period || "";
                                const periodMatch = (recordPeriod === next.period || recordPeriod.split('-').includes(next.period));
                                const student = a.students || {};
                                return subMatch && periodMatch &&
                                    student.section === next.section &&
                                    student.year === String(next.year) &&
                                    student.branch === next.branch;
                            });
                            if (nextAtt.length > 0) {
                                subjAtt = nextAtt;
                                usedPeriod = next.period;
                            }
                            break;
                        }
                    }

                    // Save state for next iteration
                    previousSlot = {
                        subjectKey,
                        branch: item.branch,
                        year: item.year,
                        section: item.section,
                        period: usedPeriod,
                        attRecords: subjAtt,
                    };

                    const uniqueStudents = new Set();
                    const deduplicatedAtt = [];
                    for (const a of subjAtt) {
                        const roll = a.students?.roll_number;
                        if (roll && !uniqueStudents.has(roll)) {
                            uniqueStudents.add(roll);
                            deduplicatedAtt.push(a);
                        }
                    }

                    const presentCount = deduplicatedAtt.filter(a => a.status === 'present').length;
                    const absentCount = deduplicatedAtt.filter(a => a.status === 'absent').length;

                    const hrIndex = teacher.name.indexOf('(HRP');
                    const tName = hrIndex > -1 ? teacher.name.substring(0, hrIndex).trim() : teacher.name;

                    const card = document.createElement('div');
                    card.innerHTML = `
                        <div class="period-badge">${escapeHTML(item.period)}</div>
                        <div class="sub-name">${escapeHTML(displaySub.name)}</div>
                        <div class="sub-meta">
                            ${escapeHTML(displaySub.code)} <span class="dot"></span> ${escapeHTML(item.branch)} <span class="dot"></span> ${escapeHTML(item.section)} <span class="dot"></span> Year ${escapeHTML(String(item.year))}
                        </div>
                        <div class="teacher-badge">
                            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle>
                            </svg>
                            ${escapeHTML(tName)}
                        </div>
                        
                        <div class="attendance-pills">
                            <div class="pill present" onclick="showStudentList('${subId}', '${item.section}', '${usedPeriod}', 'present', '${item.year}', '${item.branch}', '${encodeURIComponent(displaySub.name)}')">
                                <span class="pill-lbl">Present</span>
                                <span>${presentCount}</span>
                            </div>
                            <div class="pill absent" onclick="showStudentList('${subId}', '${item.section}', '${usedPeriod}', 'absent', '${item.year}', '${item.branch}', '${encodeURIComponent(displaySub.name)}')">
                                <span class="pill-lbl">Absent</span>
                                <span>${absentCount}</span>
                            </div>
                        </div>
                    `;
                    list.appendChild(card);
                });

                document.getElementById('totalPresent').textContent = totalP;
                document.getElementById('totalAbsent').textContent = totalA;
            } catch (err) {
                console.error("Load attendance error:", err);
                list.innerHTML = `<div class="empty-state" style="color:var(--rose)">Unable to load attendance data. Please try again.</div>`;
            }
        }

        async function showStudentList(subjectId, section, period, status, year, branch, subjectNameFallback) {
            const date = document.getElementById('datePicker').value;
            const modalOverlay = document.getElementById('modalOverlay');
            const modalTitle = document.getElementById('modalTitle');
            const studentListContainer = document.getElementById('modalStudentList');

            modalTitle.textContent = (status === 'present' ? 'Present' : 'Absent') + ' Students';
            studentListContainer.innerHTML = '<div class="empty-state">Loading list...</div>';
            modalOverlay.classList.add('active');

            try {
                // If subjectId is "null" (as string), we need to handle it
                const actualSubId = (subjectId === 'null' || !subjectId) ? null : subjectId;

                console.log("Fetching student list for:", { date, subjectId: actualSubId, subjectNameFallback, period, status, section, year, branch });

                // Fetch attendance records joined with students
                // We use a broader query and filter by period in JS to handle P1-P2 style consolidation
                let query = sb
                    .from('attendance')
                    .select('students!inner(name, roll_number, section, year, branch, face_image_url, student_mobile), status, period')
                    .eq('date', date)
                    .eq('status', status)
                    .eq('students.section', section)
                    .eq('students.year', String(year))
                    .eq('students.branch', branch);

                if (actualSubId) {
                    query = query.eq('subject_id', actualSubId);
                } else {
                    query = query.is('subject_id', null);
                }

                const { data, error } = await query;

                if (error) throw error;

                // Step 7 — Filter by Period (Flexible Match for consolidated or independent records)
                const matchedRows = (data || []).filter(r => (r.period === period || (r.period || "").split('-').includes(period)));

                console.log("Attendance result (Refined):", matchedRows);

                if (!matchedRows.length) {
                    studentListContainer.innerHTML = '<div class="empty-state">No students found</div>';
                    return;
                }

                // Sort by roll number
                matchedRows.sort((a, b) => a.students.roll_number.localeCompare(b.students.roll_number));

                studentListContainer.innerHTML = matchedRows.map((record, index) => {
                    const student = record.students;
                    const avatar = student.face_image_url
                        ? `<img src="${escapeHTML(student.face_image_url)}" class="student-avatar" onerror="this.src='https://ui-avatars.com/api/?name=${encodeURIComponent(student.name)}&background=random'"/>`
                        : `<div class="avatar-placeholder">${escapeHTML(student.name.charAt(0))}</div>`;

                    return `
                        <div class="student-item">
                            <div class="student-index">${index + 1}.</div>
                            ${avatar}
                            <div class="student-info">
                                <div class="student-name">${escapeHTML(student.name)}</div>
                                ${student.roll_number ? `<div class="student-roll">${escapeHTML(student.roll_number)}</div>` : ''}
                            </div>
                        </div>
                    `;
                }).join('');

            } catch (err) {
                console.error("Error loading student list:", err);
                studentListContainer.innerHTML = '<div class="empty-state" style="color:red">Error loading list</div>';
            }
        }

        function closeModal() {
            document.getElementById('modalOverlay').classList.remove('active');
        }
    </script>
