<!DOCTYPE html>
<html lang="en">

<head>
    <script src="security_protections.js"></script>

    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
    <title>SVPP ATTENDANCE (FACE RECOGNITION)</title>
    <style>
        *,
        *::before,
        *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html,
        body {
            width: 100%;
            height: 100%;
            background: linear-gradient(160deg, #f8fbff 0%, #e8f3ff 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .splash {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            height: 100%;
        }

        .logo-img {
            width: 180px;
            height: 180px;
            object-fit: contain;
            border-radius: 36px;
            filter: drop-shadow(0 0 32px rgba(26, 79, 219, 0.28)) drop-shadow(0 8px 20px rgba(26, 79, 219, 0.16));
            animation: splashIn 0.8s cubic-bezier(0.22, 1, 0.36, 1) forwards,
                splashOut 0.5s ease-in 1.8s forwards;
            opacity: 0;
        }

        @keyframes splashIn {
            0% {
                opacity: 0;
                transform: scale(0.82);
            }

            100% {
                opacity: 1;
                transform: scale(1);
            }
        }

        @keyframes splashOut {
            0% {
                opacity: 1;
                transform: scale(1);
            }

            100% {
                opacity: 0;
                transform: scale(1.06);
            }
        }
    </style>
</head>

<body>
    <div class="splash">
        <img src="logo.png" alt="SVPP Logo" class="logo-img" />
    </div>

    <script>
        // Auto-navigate to login after splash (0.8s in + 1s hold + 0.5s out = 2.3s)
        setTimeout(function () {
            window.location.href = 'login.html';
        }, 2400);
    </script>
</body>

</html>
